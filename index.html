<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Comercial Avançado</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React e ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Recharts -->
    <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    
    <!-- Babel -->
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #e2e8f0; } /* Fundo mais escuro para destacar as linhas finas */
        .recharts-cartesian-grid-horizontal line { stroke: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f8fafc; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .modal-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
        .modal-scroll::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .modal-scroll::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, BarChart, Bar, Cell, PieChart, Pie, Legend, ReferenceLine, ComposedChart } = window.Recharts;

        // ============================================================================
        // 🔒 COFRE DE ACESSOS (OBFUSCADO COM BASE64)
        // ============================================================================
        const USUARIOS = [
            { nome: "Diretoria (Admin)", estados: "ALL", role: "admin", hash: "YWRtaW4uZGly" }, // senha: admin.dir
            { nome: "George Silva (Admin)", estados: "ALL", role: "admin", hash: "Z3NpbHZhMDAx" }, // senha: gsilva001
            { nome: "Luiz Hamilton", estados: ["AC", "AP", "AM", "MA", "PA", "RO", "RR"], role: "ev", hash: "bHVpei5oYW1pbHRvbg==" }, // senha: luiz.hamilton
            { nome: "George Silva", estados: ["AL", "BA", "PE", "SE"], role: "ev", hash: "Z2VvcmdlLnNpbHZh" }, // senha: george.silva
            { nome: "Carine Pellegrino", estados: ["CE", "PB", "PI", "RN"], role: "ev", hash: "Y2FyaW5lLnBlbGxlZ3Jpbm8=" }, // senha: carine.pellegrino
            { nome: "Diego Garcia", estados: ["DF", "GO", "TO"], role: "ev", hash: "ZGllZ28uZ2FyY2lh" }, // senha: diego.garcia
            { nome: "Aldemir Neto", estados: ["ES", "RJ"], role: "ev", hash: "YWxkZW1pci5uZXRv" }, // senha: aldemir.neto

            { nome: "Diego Ceirutti", estados: ["PR", "SC"], role: "ev", hash: "ZGllZ28uY2VpcnV0dGk=" }, // senha: diego.ceirutti
            { nome: "Fiad Neto", estados: ["RS", "SC"], role: "ev", hash: "ZmlhZC5uZXRv" }, // senha: fiad.neto
            { nome: "Juliana Passo", estados: ["SP"], role: "ev", hash: "anVsaWFuYS5wYXNzbw==" }  // senha: juliana.passo
        ];

        // --- SVGs Inline (Ícones) ---
        const SVG_ICONS = {
            TrendingUp: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>`,
            TrendingDown: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>`,
            Search: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
            ChevronDown: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`,
            MapPin: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
            Truck: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>`,
            Users: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
            X: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
            Clock: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`,
            Package: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>`,
            List: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`,
            AlertCircle: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
            UserPlus: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>`,
            UserMinus: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="22" y1="11" x2="16" y2="11"/></svg>`,
            Bell: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>`,
            Loader2: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="animate-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>`,
            Upload: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`,
            Target: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>`,
            UserMinusAlt: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="22" y1="11" x2="16" y2="11"/></svg>`
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            const svgContent = SVG_ICONS[name] || "";
            if (!svgContent) return null;
            const modifiedSvg = svgContent.replace('<svg ', `<svg class="${className}" width="${size}" height="${size}" `);
            return <span className="inline-flex items-center justify-center" dangerouslySetInnerHTML={{ __html: modifiedSvg }} />;
        };

        // --- Constantes Globais ---
        const CHART_COLORS = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316', '#64748b', '#14b8a6'];
        const MONTH_NAMES = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];

        // --- Utilitários ---
        const removeAccents = (str) => {
            if (!str) return '';
            return String(str).normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        };

        const parseCSV = (text) => {
            const lines = text.split(/\r?\n/);
            if (lines.length === 0) return [];
            
            let headerLine = '';
            let startIndex = 0;
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].trim() !== '') {
                    headerLine = lines[i];
                    startIndex = i + 1;
                    break;
                }
            }
            if (!headerLine) return [];
            
            const delimiter = headerLine.includes(';') ? ';' : (headerLine.includes('\t') ? '\t' : ',');
            const headers = headerLine.split(delimiter).map(h => h.replace(/^"|"$/g, '').trim());
            
            const result = [];
            for (let i = startIndex; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                let values;
                if (!line.includes('"')) {
                    values = line.split(delimiter);
                } else {
                    values = [];
                    let current = '';
                    let inQuotes = false;
                    for (let j = 0; j < line.length; j++) {
                        const char = line[j];
                        if (char === '"' && line[j+1] === '"') { current += '"'; j++; }
                        else if (char === '"') { inQuotes = !inQuotes; }
                        else if (char === delimiter && !inQuotes) { values.push(current); current = ''; }
                        else { current += char; }
                    }
                    values.push(current);
                }
                
                const obj = {};
                for (let j = 0; j < headers.length; j++) {
                    const header = headers[j];
                    const hLower = header.toLowerCase();
                    let val = values[j] !== undefined ? values[j].trim().replace(/^"|"$/g, '') : '';
                    
                    if (['amount', 'qty', 'quantidade', 'volume', 'faturamento', 'total', 'valor', 'month', 'year', 'mes', 'ano'].includes(hLower)) {
                        val = parseFloat(val.replace(/\./g, '').replace(',', '.'));
                        if (isNaN(val)) val = 0;
                    } else if (hLower === 'cnpj') {
                        val = val.replace(/\D/g, '');
                    } else if (['state', 'estado', 'uf'].includes(hLower)) {
                        val = val.toUpperCase();
                    } else if (['city', 'cidade', 'municipio'].includes(hLower)) {
                        obj._city = val;
                    }
                    obj[header] = val;
                    
                    if (['amount', 'faturamento', 'total', 'valor'].includes(hLower)) obj._amount = val;
                    if (['qty', 'quantidade', 'volume', 'qtd', 'qtde'].includes(hLower)) obj._qty = val;
                    if (['customer', 'cliente', 'nome fantasia', 'razao social'].includes(hLower)) obj._customer = val;
                    if (['distributor', 'distribuidor', 'parceiro', 'revenda'].includes(hLower)) obj._distributor = val;
                    if (['hq standard name', 'standard', 'produto', 'product', 'item'].includes(hLower)) obj._product = val;
                    if (['state', 'estado', 'uf'].includes(hLower)) obj._state = val;
                    if (['customer type', 'tipo cliente', 'tipo de cliente'].includes(hLower)) obj._customerType = val;
                    if (hLower === 'type' || hLower === 'unidade') obj._type = val;
                    if (hLower === 'year' || hLower === 'ano') obj._year = val;
                    if (hLower === 'month' || hLower === 'mes') obj._month = val;
                }

                let rawDate = obj['Date'] || obj['date'] || obj['Data'] || obj['data'] || obj['DATA'] || obj['DATE'] || '';
                obj._rawDate = rawDate;

                let timestamp = 0;
                let displayDate = '';

                if (rawDate) {
                    let dtStr = String(rawDate).trim().split(' ')[0];
                    let dt;
                    if (dtStr.match(/^\d{2}\/\d{2}\/\d{4}/)) {
                        const parts = dtStr.split('/');
                        obj._month = obj._month || parseInt(parts[1], 10);
                        obj._year = obj._year || parseInt(parts[2], 10);
                        dt = new Date(`${parts[2].substring(0,4)}-${parts[1]}-${parts[0]}T12:00:00Z`);
                        displayDate = `${parts[0]}/${parts[1]}/${parts[2].substring(0,4)}`;
                    } else if (dtStr.match(/^\d{4}-\d{2}-\d{2}/)) {
                        obj._year = obj._year || parseInt(dtStr.substring(0,4), 10);
                        obj._month = obj._month || parseInt(dtStr.substring(5,7), 10);
                        dt = new Date(`${dtStr.substring(0,4)}-${dtStr.substring(5,7)}-${dtStr.substring(8,10)}T12:00:00Z`);
                        displayDate = `${dtStr.substring(8,10)}/${dtStr.substring(5,7)}/${dtStr.substring(0,4)}`;
                    } else {
                        dt = new Date(dtStr);
                        if (!isNaN(dt)) {
                            obj._year = obj._year || dt.getUTCFullYear();
                            obj._month = obj._month || (dt.getUTCMonth() + 1);
                            displayDate = `${String(dt.getUTCDate()).padStart(2, '0')}/${String(dt.getUTCMonth() + 1).padStart(2, '0')}/${dt.getUTCFullYear()}`;
                        }
                    }
                    if (dt && !isNaN(dt)) timestamp = dt.getTime();
                }
                
                if (!timestamp && obj._year && obj._month) {
                    const dt = new Date(`${obj._year}-${String(obj._month).padStart(2, '0')}-01T12:00:00Z`);
                    timestamp = dt.getTime();
                    displayDate = `01/${String(obj._month).padStart(2, '0')}/${obj._year}`;
                }

                obj._timestamp = timestamp;
                obj._displayDate = displayDate || 'N/I';
                obj._amount = Number(obj._amount) || 0;
                obj._qty = Number(obj._qty) || 0;
                obj._customer = obj._customer || 'Não Informado';
                obj._distributor = obj._distributor || 'Não Informado';
                obj._product = obj._product || 'Não Informado';
                obj._state = obj._state || 'N/I';
                obj._city = obj._city || 'N/I';
                obj._year = parseInt(obj._year) || 0;
                obj._month = parseInt(obj._month) || 0;
                obj._type = obj._type || 'N/I';
                obj._customerType = obj._customerType || 'N/I';

                result.push(obj);
            }
            return result;
        };

        const formatCurrency = (val) => {
            const numVal = Number(val) || 0;
            if (numVal >= 1000000) return `R$ ${(numVal/1000000).toFixed(2)}M`;
            if (numVal >= 1000) return `R$ ${(numVal/1000).toFixed(2)}k`;
            return `R$ ${numVal.toFixed(2)}`;
        };

        const formatShortNumber = (val) => {
            const numVal = Number(val) || 0;
            if (numVal >= 1000000) return `${(numVal/1000000).toFixed(1)}M`;
            if (numVal >= 1000) return `${(numVal/1000).toFixed(1)}k`;
            return numVal.toFixed(1);
        };

        const formatYAxisTick = (val) => {
            if (!val) return '';
            const strVal = String(val);
            return strVal.length > 20 ? strVal.substring(0, 20) + '...' : strVal;
        };

        const getRankBadge = (rank) => {
            if (!rank) return null;
            if (rank <= 20) return <span className="bg-amber-100 text-amber-700 border border-amber-200 px-2 py-0.5 rounded text-[9px] font-black shrink-0">TOP 20 (🏆 #{rank})</span>;
            if (rank <= 50) return <span className="bg-blue-100 text-blue-700 border border-blue-200 px-2 py-0.5 rounded text-[9px] font-black shrink-0">TOP 50 (⭐ #{rank})</span>;
            if (rank <= 100) return <span className="bg-emerald-100 text-emerald-700 border border-emerald-200 px-2 py-0.5 rounded text-[9px] font-black shrink-0">TOP 100 (🚀 #{rank})</span>;
            return <span className="bg-slate-100 text-slate-600 border border-slate-200 px-2 py-0.5 rounded text-[9px] font-black shrink-0">RANK #{rank}</span>;
        };

        const renderProductBarLabel = ({ x, y, width, height, value }) => {
            if (value === undefined || value === null) return null;
            return <text x={(x||0) + (width||0) + 4} y={(y||0) + (height||0) / 2 + 1} fill="#3b82f6" textAnchor="start" dominantBaseline="central" fontSize="9" fontWeight="bold">{(Number(value) || 0).toLocaleString('pt-BR')} un</text>;
        };

        const renderDistributorBarLabel = ({ x, y, width, height, value }) => {
            if (value === undefined || value === null) return null;
            return <text x={(x||0) + (width||0) + 4} y={(y||0) + (height||0) / 2 + 1} fill="#10b981" textAnchor="start" dominantBaseline="central" fontSize="9" fontWeight="bold">{formatShortNumber(value)}</text>;
        };

        const renderClientBarLabel = ({ x, y, width, height, value }) => {
            if (value === undefined || value === null) return null;
            return <text x={(x||0) + (width||0) + 4} y={(y||0) + (height||0) / 2 + 1} fill="#f59e0b" textAnchor="start" dominantBaseline="central" fontSize="9" fontWeight="bold">{formatShortNumber(value)}</text>;
        };

        // --- Componentes UI Base ---
        const DebouncedInput = ({ value, onChange, placeholder, icon }) => {
            const [localVal, setLocalVal] = useState(value || '');
            const onChangeRef = useRef(onChange);

            useEffect(() => { onChangeRef.current = onChange; }, [onChange]);
            useEffect(() => { setLocalVal(value || ''); }, [value]);

            useEffect(() => {
                const id = setTimeout(() => { onChangeRef.current(localVal); }, 300);
                return () => clearTimeout(id);
            }, [localVal]);

            return (
                <div className="relative flex items-center h-[28px] lg:h-[30px]">
                    <Icon name={icon} className="absolute left-2 text-slate-400 pointer-events-none" size={12} />
                    <input 
                        type="text" 
                        placeholder={placeholder} 
                        value={localVal} 
                        onChange={e => setLocalVal(e.target.value)} 
                        className="w-full h-full pl-7 pr-7 bg-slate-50 border border-slate-200 rounded-md text-[10px] font-semibold focus:ring-1 focus:ring-blue-500 outline-none text-slate-700 transition-all" 
                    />
                    {localVal && (
                        <button onClick={() => { setLocalVal(''); onChangeRef.current(''); }} className="absolute right-0 w-7 h-full flex items-center justify-center text-slate-400 hover:text-rose-500 transition-colors rounded-r-md">
                            <Icon name="X" size={12}/>
                        </button>
                    )}
                </div>
            );
        };

        const CustomSingleSelect = ({ label, options, selected, onChange, placeholder, searchable = false }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const ref = useRef(null);
            const safeOptions = Array.isArray(options) ? options : [];

            useEffect(() => {
                const handleClickOutside = (e) => { if (ref.current && !ref.current.contains(e.target)) setIsOpen(false); };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const filteredOptions = searchable && searchTerm 
                ? safeOptions.filter(o => removeAccents(String(o.label || '').toLowerCase()).includes(removeAccents(searchTerm.toLowerCase()))) 
                : safeOptions;
                
            const selectedLabel = safeOptions.find(o => o.value === selected)?.label || placeholder;

            return (
                <div className="relative flex flex-col gap-0.5 min-w-[180px] flex-1" ref={ref}>
                    {label && <label className="text-[8px] font-black text-slate-400 uppercase tracking-wider">{label}</label>}
                    <div className="bg-white border border-slate-200 rounded-md px-2 py-1 text-[10px] font-semibold text-slate-700 cursor-pointer flex justify-between items-center hover:bg-slate-50 transition-colors shadow-sm h-[28px] lg:h-[30px]" onClick={() => setIsOpen(!isOpen)}>
                        <span className="truncate max-w-[200px]" title={selectedLabel}>{selectedLabel}</span>
                        <Icon name="ChevronDown" size={12} className="text-slate-400 shrink-0 ml-1" />
                    </div>
                    {isOpen && (
                        <div className="absolute top-[105%] left-0 w-full min-w-[240px] bg-white border border-slate-200 rounded-md shadow-xl z-50 max-h-60 flex flex-col overflow-hidden">
                            {searchable && (
                                <div className="p-1.5 border-b border-slate-100 bg-slate-50 flex items-center relative">
                                    <Icon name="Search" size={10} className="text-slate-400 absolute left-3 pointer-events-none" />
                                    <input type="text" placeholder="Pesquisar..." className="w-full pl-6 pr-6 py-1 text-[10px] font-semibold bg-white border border-slate-200 rounded outline-none focus:ring-1 focus:ring-blue-500 transition-all" onChange={(e) => setSearchTerm(e.target.value)} value={searchTerm} />

        const App = () => {

            const [localModalSearch, setLocalModalSearch] = useState('');

            const [modalAbcFilter, setModalAbcFilter] = useState('TODOS');
            const [analiticoSortConfig, setAnaliticoSortConfig] = useState({ column: 'data', direction: 'desc' });
            const [abcDimension, setAbcDimension] = useState('clientes');
            const [modalEvolucaoMode, setModalEvolucaoMode] = useState('faturamento');

            const [filters, setFilters] = useState({ searchCustomer: '', searchProduct: '', years: [], months: [], state: [], distributor: [], customerType: [], type: [], product: [] });

            useEffect(() => {
                const loadData = async () => {
                    try {
                        if (window.location.protocol === 'blob:' || window.location.protocol === 'data:' || window.location.protocol === 'file:' || window.origin === 'null') {
                            setIsLoadingAuto(false); return; 
                        }
                        const response = await fetch('data.csv');
                        if (!response.ok) { setIsLoadingAuto(false); return; }
                        const csvText = await response.text();
                        setTimeout(() => { try { processData(csvText, currentUser); } catch (e) { setErrorMsg("Erro ao processar dados iniciais."); } setIsLoadingAuto(false); }, 50);
                    } catch (err) { setIsLoadingAuto(false); }
                };
                loadData();
            }, []);

            const processData = (csvText, activeUser) => {
                const parsed = parseCSV(csvText);
                if (parsed.length === 0) { setErrorMsg("Arquivo CSV vazio ou inválido."); return; }

                let maxDate = null; const resultData = [];
                for(let i=0; i<parsed.length; i++) {
                    const row = parsed[i];
                    if (activeUser && activeUser.role !== 'admin') { if (!activeUser.estados.includes(row._state)) continue; }
                    resultData.push(row);
                    let dt = null;
                    if (row._rawDate) {
                        let dtStr = String(row._rawDate).trim().split(' ')[0];
                        if (dtStr.match(/^\d{2}\/\d{2}\/\d{4}/)) { const p = dtStr.split('/'); dt = new Date(`${p[2]}-${p[1]}-${p[0]}T12:00:00Z`); } 
                        else if (dtStr.match(/^\d{4}-\d{2}-\d{2}/)) { const p = dtStr.split('-'); dt = new Date(`${p[0]}-${p[1]}-${p[2]}T12:00:00Z`); } 
                        else { dt = new Date(dtStr); }
                    }
                    if ((!dt || isNaN(dt)) && row._year && row._month) dt = new Date(`${row._year}-${String(row._month).padStart(2, '0')}-01T12:00:00Z`);
                    if (dt && !isNaN(dt) && (!maxDate || dt > maxDate)) maxDate = dt;
                }

                if (resultData.length === 0) { setErrorMsg(`Nenhum dado encontrado para a região.`); setIsLoaded(false); return; }
                
                setData(resultData); setIsLoaded(true); setShowUploadScreen(false); setErrorMsg(null);
                
                if (maxDate) {
                    const day = String(maxDate.getUTCDate()).padStart(2, '0');
                    const month = String(maxDate.getUTCMonth() + 1).padStart(2, '0');
                    setLastUpdate(`${day}/${month}/${maxDate.getUTCFullYear()}`);
                } else setLastUpdate("Desconhecida");

                const wispTypes = [...new Set(resultData.map(d => d._customerType))].filter(c => typeof c === 'string' && c.toUpperCase().includes('WISP'));
                setFilters(f => ({ ...f, customerType: wispTypes }));
            };

            const options = useMemo(() => {
                if (!data.length) return {};
                const getU = (k) => [...new Set(data.map(d => d[k]))].filter(Boolean).sort();
                return {
                    years: getU('_year').sort((a,b)=>b-a).map(y => ({label: String(y), value: String(y)})),
                    months: MONTH_NAMES.map((m, i) => ({label: m, value: String(i+1)})),
                    states: getU('_state').map(s => ({label: s, value: s})),
                    distributors: getU('_distributor').map(d => ({label: d, value: d})),
                    customerTypes: getU('_customerType').map(c => ({label: c, value: c})),
                    units: getU('_type').map(t => ({label: t, value: t})),

            }, [data]);

            const activeYears = useMemo(() => filters.years.length > 0 ? filters.years.map(Number).sort((a,b)=>a-b) : (options.years ? [Number(options.years[0].value)] : []), [filters.years, options]);
            const allAvailableYears = useMemo(() => options.years ? options.years.map(o => Number(o.value)) : [], [options]);

            const filteredData = useMemo(() => {
                if (!data.length) return [];
                return data.filter(item => {
                    if (filters.years.length > 0 && !filters.years.includes(String(item._year))) return false;
                    if (filters.months.length > 0 && !filters.months.includes(String(item._month))) return false;
                    if (filters.state.length > 0 && !filters.state.includes(item._state)) return false;
                    if (filters.distributor.length > 0 && !filters.distributor.includes(item._distributor)) return false;
                    if (filters.type.length > 0 && !filters.type.includes(item._type)) return false;
                    if (filters.customerType.length > 0 && !filters.customerType.includes(item._customerType)) return false;
                    const prodName = item._product || '';
                    if (filters.product.length > 0 && !filters.product.includes(prodName)) return false;
                    if (filters.searchCustomer) {
                        const term = removeAccents(String(filters.searchCustomer).toLowerCase().trim()); const termDigits = term.replace(/\D/g, '');
                        if (!(removeAccents(String(item._customer).toLowerCase()).includes(term) || (termDigits && String(item.cnpj || '').includes(termDigits)))) return false;
                    }
                    if (filters.searchProduct && !removeAccents(String(item._product).toLowerCase()).includes(removeAccents(String(filters.searchProduct).toLowerCase().trim()))) return false;
                    return true;
                });
            }, [data, filters]);

            const yearComparison = useMemo(() => {
                if (!data.length) return null;
                const refYears = filters.years.length > 0 ? filters.years.map(Number).sort((a,b)=>b-a) : [...new Set(data.map(d=>d._year))].filter(y=>y>0).sort((a,b)=>b-a);
                if (refYears.length === 0) return null;
                const refYear = refYears[0];
                const explicitMonths = filters.months.length > 0 ? filters.months.map(Number).sort((a,b)=>a-b) : [];
                const yearData = data.filter(d => d._year === refYear && d._month > 0);
                const maxAvailMonth = yearData.length > 0 ? Math.max(...yearData.map(d => d._month)) : 12;

                let curLabel = ''; let prevLabel = ''; let curData = []; let compData = []; let curEndAbs = 0;

                const passesBase = (item) => {
                    if (filters.state.length > 0 && !filters.state.includes(item._state)) return false;
                    if (filters.distributor.length > 0 && !filters.distributor.includes(item._distributor)) return false;
                    if (filters.type.length > 0 && !filters.type.includes(item._type)) return false;
                    if (filters.customerType.length > 0 && !filters.customerType.includes(item._customerType)) return false;
                    if (filters.product.length > 0 && !filters.product.includes(item._product || '')) return false;
                    if (filters.searchCustomer) {
                        const term = removeAccents(String(filters.searchCustomer).toLowerCase().trim()); const termDigits = term.replace(/\D/g, '');
                        if (!(removeAccents(String(item._customer).toLowerCase()).includes(term) || (termDigits && String(item.cnpj || '').includes(termDigits)))) return false;
                    }
                    if (filters.searchProduct && !removeAccents(String(item._product).toLowerCase()).includes(removeAccents(String(filters.searchProduct).toLowerCase().trim()))) return false;
                    return true;
                };

                if (timeMode === 'UDM') {
                    let endMonth = explicitMonths.length > 0 ? explicitMonths[explicitMonths.length - 1] : maxAvailMonth;
                    if (endMonth > maxAvailMonth) endMonth = maxAvailMonth;
                    curEndAbs = refYear * 12 + endMonth;
                    const curStartAbs = curEndAbs - 11; const prevEndAbs = curEndAbs - 12; const prevStartAbs = prevEndAbs - 11;
                    const formatPeriod = (startAbs, endAbs) => `${MONTH_NAMES[((startAbs - 1) % 12)]}/${Math.floor((startAbs - 1) / 12).toString().slice(-2)} a ${MONTH_NAMES[((endAbs - 1) % 12)]}/${Math.floor((endAbs - 1) / 12).toString().slice(-2)}`;
                    curLabel = formatPeriod(curStartAbs, curEndAbs); prevLabel = formatPeriod(prevStartAbs, prevEndAbs);
                    curData = data.filter(d => { if (!passesBase(d)) return false; const abs = d._year * 12 + d._month; return abs >= curStartAbs && abs <= curEndAbs; });
                    compData = data.filter(d => { if (!passesBase(d)) return false; const abs = d._year * 12 + d._month; return abs >= prevStartAbs && abs <= prevEndAbs; });
                } else { 
                    curEndAbs = refYear * 12 + (explicitMonths.length > 0 ? Math.max(...explicitMonths) : maxAvailMonth);
                    
                    const activeYearsStr = refYears.length > 2 ? `${refYears.length} anos` : refYears.map(y => y.toString().slice(-2)).join('/');
                    const compYearsStr = refYears.length > 2 ? `Anterior` : refYears.map(y => (y - 1).toString().slice(-2)).join('/');

                    if (explicitMonths.length > 0) {
                         curLabel = `Meses Sel. (${activeYearsStr})`;

                         prevLabel = `Acumulado (${compYearsStr})`;
                    } else {
                         curLabel = `Jan a ${MONTH_NAMES[maxAvailMonth-1]} (${activeYearsStr})`;
                         prevLabel = `Jan a ${MONTH_NAMES[maxAvailMonth-1]} (${compYearsStr})`;

                    curData = data.filter(d => {
                        if (!refYears.includes(d._year)) return false;
                        if (explicitMonths.length > 0 && !explicitMonths.includes(d._month)) return false;

                    });

                    const compYears = refYears.map(y => y - 1);
                    compData = data.filter(d => {
                        if (!compYears.includes(d._year)) return false;

                            if (!explicitMonths.includes(d._month)) return false;
                        } else {
                            if (d._year === refYear - 1 && d._month > maxAvailMonth) return false;

                        return passesBase(d);
                    });
                }
                return { curLabel, prevLabel, dataCur: curData, dataComp: compData, curEndAbs };
            }, [data, filters, timeMode]);

            const metrics = useMemo(() => {
                if (!yearComparison) return { fatCur: 0, fatComp: 0, capCur: 0, capComp: 0, novosMain: 0, perdidosMain: 0, alertaMain: 0, precoMedioCur: 0, precoMedioGrowth: null, alertaDetails: [], novosDetails: [], perdidosDetails: [], top20Details: [], allClientsRanked: [] };
                const { dataCur, dataComp, curEndAbs } = yearComparison;
                let fatCurTotal = 0; let fatCompTotal = 0; let qtyCurTotal = 0; let qtyCompTotal = 0;
                const cliMap = new Map();
                
                for (let i = 0; i < dataCur.length; i++) {
                    const d = dataCur[i]; fatCurTotal += d._amount; qtyCurTotal += d._qty;

                    if (c) {
                        if (!cliMap.has(c)) cliMap.set(c, { cnpj: c, name: d._customer, state: d._state, fatCur: 0, fatComp: 0, curVal: 0, compVal: 0, qtyCur: 0, qtyComp: 0, maxDateAbs: 0, distributors: new Map(), products: new Map() });
                        const entry = cliMap.get(c);
                        entry.fatCur += d._amount; entry.curVal += d._amount; entry.qtyCur += d._qty;
                        const dAbs = d._year * 12 + d._month; if (dAbs > entry.maxDateAbs) entry.maxDateAbs = dAbs;
                        const distName = d._distributor || 'N/I'; entry.distributors.set(distName, (entry.distributors.get(distName) || 0) + d._amount);

                    }

                for (let i = 0; i < dataComp.length; i++) {
                    const d = dataComp[i]; fatCompTotal += d._amount; qtyCompTotal += d._qty;
                    const c = String(d.cnpj || '').replace(/\D/g, '');
                    if (c) {
                        if (!cliMap.has(c)) cliMap.set(c, { cnpj: c, name: d._customer, state: d._state, fatCur: 0, fatComp: 0, curVal: 0, compVal: 0, qtyCur: 0, qtyComp: 0, maxDateAbs: 0, distributors: new Map(), products: new Map() });
                        const entry = cliMap.get(c);
                        entry.fatComp += d._amount; entry.compVal += d._amount; entry.qtyComp += d._qty;

                                <button onClick={() => openModal('abc')} className="flex items-center gap-1 bg-indigo-50 text-indigo-700 border border-indigo-200 px-2.5 py-1 rounded text-[9px] font-bold hover:bg-indigo-100 transition-colors"><Icon name="Target" size={10}/> Curva ABC</button>
                                <button onClick={() => openModal('analitico')} className="flex items-center gap-1 bg-blue-50 text-blue-700 border border-blue-200 px-2.5 py-1 rounded text-[9px] font-bold hover:bg-blue-100 transition-colors"><Icon name="List" size={10}/> Visão Analítica</button>
                                <button onClick={() => { setShowUploadScreen(true); setIsLoaded(false); }} className="flex items-center gap-1 bg-slate-900 text-white px-2.5 py-1 rounded text-[9px] font-bold hover:bg-black transition-colors"><Icon name="Upload" size={10}/> Arquivo</button>
                                <button onClick={() => { setShowUploadScreen(true); setIsLoaded(false); setCurrentUser(null); setPasswordValue(''); setIsAdminVerified(false); }} className="flex items-center gap-1 bg-rose-50 text-rose-700 border border-rose-200 px-2.5 py-1 rounded text-[9px] font-bold hover:bg-rose-100 transition-colors"><Icon name="UserMinus" size={10}/> Sair</button>
                            </div>
                        </div>

                        {/* FILTROS GLOBAIS */}
                        <div className="bg-white p-2 rounded-lg border border-slate-200 shadow-sm flex flex-wrap gap-1.5 items-end">
                            <div className="flex-1 min-w-[120px]"><DebouncedInput value={filters.searchCustomer} onChange={v => setFilters({...filters, searchCustomer: v})} placeholder="Nome/CNPJ..." icon="Search" /></div>
                            <div className="flex-1 min-w-[120px]"><DebouncedInput value={filters.searchProduct} onChange={v => setFilters({...filters, searchProduct: v})} placeholder="Produto..." icon="Package" /></div>
                            <CustomMultiSelect label="Anos" options={options.years} selected={filters.years} onChange={v => setFilters({...filters, years: v})} placeholder="Todos" searchable={true} />
                            <CustomMultiSelect label="Meses" options={options.months} selected={filters.months} onChange={v => setFilters({...filters, months: v})} placeholder="Todos" searchable={true} />
                            <CustomMultiSelect label="Estado" options={options.states} selected={filters.state} onChange={v => setFilters({...filters, state: v})} placeholder="Todos" searchable={true} />
                            <CustomMultiSelect label="Distribuidor" options={options.distributors} selected={filters.distributor} onChange={v => setFilters({...filters, distributor: v})} placeholder="Todos" searchable={true} />
                            <CustomMultiSelect label="Tipo Cliente" options={options.customerTypes} selected={filters.customerType} onChange={v => setFilters({...filters, customerType: v})} placeholder="Todos" searchable={true} />
                            <CustomMultiSelect label="Unidade" options={options.units} selected={filters.type} onChange={v => setFilters({...filters, type: v})} placeholder="Todas" searchable={true} />
                        </div>

                        {/* KPIs */}
                        <div className="grid grid-cols-2 lg:grid-cols-6 gap-1.5">
                            <div className="bg-white p-3 rounded-lg border border-slate-200 shadow-sm flex flex-col justify-between">
                                <div><p className="text-slate-400 text-[8px] font-black uppercase mb-0.5 cursor-help border-b border-dashed border-slate-300 w-fit" title="Vendas brutas geradas no período selecionado.">Faturamento ({timeMode})</p><h3 className="text-lg font-black text-slate-800">{formatCurrency(metrics.fatCur || 0)}</h3></div>
                                <GrowthBadge growth={metrics.fatGrowth} curLabel={yearComparison?.curLabel} prevLabel={yearComparison?.prevLabel} timeMode={timeMode} />
                            </div>
                            <div onClick={() => openModal('preco')} className="bg-white hover:bg-slate-50 p-3 rounded-lg border border-slate-200 shadow-sm flex flex-col justify-between cursor-pointer group">
                                <div><div className="flex justify-between items-start mb-0.5"><p className="text-slate-500/70 text-[8px] font-black uppercase cursor-help border-b border-dashed border-slate-300 w-fit" title="Faturamento Total / Unidades (R$ por unid.).">Preço Médio ({timeMode})</p><Icon name="Package" size={10} className="text-slate-300 group-hover:text-blue-500" /></div><h3 className="text-lg font-black text-blue-600">R$ {Number(metrics.precoMedioCur || 0).toFixed(2)}</h3></div>
                                <div className="flex flex-col gap-0.5 mt-auto"><GrowthBadge growth={metrics.precoMedioGrowth} curLabel={yearComparison?.curLabel} prevLabel={yearComparison?.prevLabel} timeMode={timeMode} /><div className="mt-1 flex items-center gap-1 text-[8px] font-bold w-fit px-1.5 py-0.5 rounded bg-slate-50 text-slate-500 group-hover:bg-blue-100 group-hover:text-blue-600 border border-slate-200">Ver Tabela</div></div>
                            </div>
                            <div onClick={() => openModal('capilaridade')} className="bg-white hover:bg-slate-50 p-3 rounded-lg border border-slate-200 shadow-sm flex flex-col justify-between cursor-pointer group">
                                <div><div className="flex justify-between items-start mb-0.5"><p className="text-slate-500/70 text-[8px] font-black uppercase cursor-help border-b border-dashed border-slate-300 w-fit" title="CNPJs únicos ativos no período.">Capilaridade ({timeMode})</p><Icon name="TrendingUp" size={10} className="text-slate-300 group-hover:text-blue-500" /></div><h3 className="text-lg font-black text-slate-800">{Number(metrics.capCur || 0).toLocaleString('pt-BR')}</h3></div>
                                <div className="flex flex-col gap-0.5 mt-auto"><GrowthBadge growth={metrics.capGrowth} curLabel={yearComparison?.curLabel} prevLabel={yearComparison?.prevLabel} timeMode={timeMode} /><div className="mt-1 flex items-center gap-1 text-[8px] font-bold w-fit px-1.5 py-0.5 rounded bg-slate-50 text-slate-500 group-hover:bg-blue-100 group-hover:text-blue-600 border border-slate-200">Evolução</div></div>
                            </div>
                            <div onClick={() => openModal('novos')} className="bg-emerald-50 hover:bg-emerald-100 p-3 rounded-lg border border-emerald-200 shadow-sm flex flex-col justify-between cursor-pointer group">
                                <div><div className="flex justify-between items-start mb-0.5"><p className="text-emerald-600/70 text-[8px] font-black uppercase cursor-help border-b border-dashed border-emerald-400 w-fit" title="Sem compras no período comparativo.">Clientes Novos</p><Icon name="List" size={10} className="text-emerald-400 group-hover:text-emerald-600" /></div><h3 className="text-lg font-black text-emerald-700">{Number(metrics.novosMain || 0).toLocaleString('pt-BR')}</h3><p className="text-emerald-600 text-[8px] font-bold">{formatCurrency(metrics.fatNovosMain)}</p></div>
                                <div className="flex flex-col gap-0.5 mt-auto"><div className="mt-1 flex items-center gap-1 text-[8px] font-bold w-fit px-1.5 py-0.5 rounded bg-emerald-200/50 text-emerald-700 group-hover:bg-emerald-600 group-hover:text-white transition-colors">Detalhar {timeMode}</div></div>
                            </div>
                            <div onClick={() => openModal('alerta')} className="bg-amber-50 hover:bg-amber-100 p-3 rounded-lg border border-amber-200 shadow-sm flex flex-col justify-between cursor-pointer group">
                                <div><div className="flex justify-between items-start mb-0.5"><p className="text-amber-600/70 text-[8px] font-black uppercase cursor-help border-b border-dashed border-amber-400 w-fit" title="Venceram o estoque estimado.">Em Alerta</p><Icon name="Bell" size={10} className="text-amber-400 group-hover:text-amber-600" /></div><h3 className="text-lg font-black text-amber-700">{Number(metrics.alertaMain || 0).toLocaleString('pt-BR')}</h3><p className="text-amber-600 text-[8px] font-bold">Risco de Churn</p></div>
                                <div className="flex flex-col gap-0.5 mt-auto"><div className="mt-1 flex items-center gap-1 text-[8px] font-bold w-fit px-1.5 py-0.5 rounded bg-amber-200/50 text-amber-800 group-hover:bg-amber-600 group-hover:text-white transition-colors">Detalhar {timeMode}</div></div>
                            </div>
                            <div onClick={() => openModal('perdidos')} className="bg-rose-50 hover:bg-rose-100 p-3 rounded-lg border border-rose-200 shadow-sm flex flex-col justify-between cursor-pointer group">
                                <div><div className="flex justify-between items-start mb-0.5"><p className="text-rose-600/70 text-[8px] font-black uppercase cursor-help border-b border-dashed border-rose-400 w-fit" title="Compraram no anterior e estão a zero.">Clientes Perdidos</p><Icon name="List" size={10} className="text-rose-400 group-hover:text-rose-600" /></div><h3 className="text-lg font-black text-rose-700">{Number(metrics.perdidosMain || 0).toLocaleString('pt-BR')}</h3><p className="text-rose-600 text-[8px] font-bold">{formatCurrency(metrics.fatPerdidosMain)}</p></div>
                                <div className="flex flex-col gap-0.5 mt-auto"><div className="mt-1 flex items-center gap-1 text-[8px] font-bold w-fit px-1.5 py-0.5 rounded bg-rose-200/50 text-rose-700 group-hover:bg-rose-600 group-hover:text-white transition-colors">Detalhar {timeMode}</div></div>
                            </div>
                        </div>

                        {/* GRÁFICOS MEIO */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-1.5">
                            <div className="lg:col-span-2 bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
                                <div className="flex justify-between items-center mb-2">
                                    <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-800 flex items-center gap-1.5"><Icon name="TrendingUp" className="text-blue-600" size={12}/> Evolução Mensal</h3>
                                    <div className="flex bg-slate-100 p-0.5 rounded">
                                        <button onClick={() => setEvolucaoMode('faturamento')} className={`px-2 py-0.5 text-[8px] font-bold rounded ${evolucaoMode === 'faturamento' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'}`}>R$ Fat.</button>
                                        <button onClick={() => setEvolucaoMode('quantidade')} className={`px-2 py-0.5 text-[8px] font-bold rounded ${evolucaoMode === 'quantidade' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'}`}>Qtd.</button>
                                    </div>
                                </div>
                                <div className="h-[200px] w-full">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <LineChart data={evolucaoChartState.data} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                            <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize: 10, fontWeight: 600, fill: '#94a3b8'}} />
                                            <YAxis axisLine={false} tickLine={false} tick={{fontSize: 10, fontWeight: 600, fill: '#94a3b8'}} tickFormatter={v => evolucaoMode === 'faturamento' ? `${(Number(v)/1000000).toFixed(1)}M` : (v>=1000 ? (Number(v)/1000).toFixed(1)+'k' : v)} />
                                            <Tooltip formatter={(v, name) => [evolucaoMode === 'faturamento' ? formatCurrency(v) : `${Number(v || 0).toLocaleString('pt-BR')} un`, `Ano ${name}`]} contentStyle={{borderRadius: '12px', border: 'none', boxShadow: '0 10px 15px rgba(0,0,0,0.1)'}} />
                                            <Legend verticalAlign="top" height={24} iconType="circle" wrapperStyle={{ fontSize: '10px', fontWeight: 'bold', color: '#64748b' }} />
                                            {mediaEvolucao !== null && <ReferenceLine y={mediaEvolucao} stroke="#94a3b8" strokeDasharray="4 4" label={{ position: 'top', value: `Média: ${evolucaoMode === 'faturamento' ? formatCurrency(mediaEvolucao) : (mediaEvolucao>=1000 ? (Number(mediaEvolucao)/1000).toFixed(1)+'k' : Number(mediaEvolucao).toFixed(0))}`, fill: '#64748b', fontSize: 9, fontWeight: 'bold' }} />}
                                            {evolucaoChartState.lines.map((y, i) => <Line key={y} type="monotone" dataKey={y} name={y.toString()} stroke={CHART_COLORS[i % CHART_COLORS.length]} strokeWidth={2.5} dot={{r: 3, strokeWidth: 1.5}} activeDot={{r: 5}} connectNulls={false} />)}
                                        </LineChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                            <div className="bg-white p-3 rounded-lg border border-slate-200 shadow-sm flex flex-col">
                                <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-800 flex items-center gap-1.5 mb-2"><Icon name="List" className="text-blue-600" size={12}/> Representatividade ({timeMode})</h3>
                                <div className="flex flex-wrap gap-1 mb-2 bg-slate-100 p-0.5 rounded w-fit">
                                    {['UF', 'Tipo Cliente', 'Unidade', 'Distribuidor'].map(metric => (<button key={metric} onClick={() => setPieChartMetric(metric)} className={`px-2 py-0.5 text-[8px] font-bold rounded transition-all ${pieChartMetric === metric ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'}`}>{metric}</button>))}
                                </div>
                                <div className="h-[180px] w-full flex-1">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <PieChart>
                                            <Pie data={pieChartData} dataKey="value" nameKey="name" cx="50%" cy="50%" innerRadius={35} outerRadius={55} paddingAngle={2} label={({ name, percent }) => `${String(name).substring(0,8)}${String(name).length > 8 ? '...' : ''} ${(Number(percent) * 100).toFixed(1)}%`} labelLine={true} labelStyle={{fontSize: '8px', fontWeight: 'bold', fill: '#64748b'}}>
                                                {pieChartData.map((e, i) => <Cell key={i} fill={CHART_COLORS[i % CHART_COLORS.length]} />)}
                                            </Pie>
                                            <Tooltip content={<CustomUFTooltip />} />
                                        </PieChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        </div>

                        {/* GRÁFICOS BASE */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-1.5">
                            <div className="bg-white p-3 rounded-lg border border-slate-200 shadow-sm flex flex-col group">
                                <div className="flex justify-between items-center mb-2"><h3 className="text-[10px] font-black uppercase tracking-widest text-slate-800 flex items-center gap-1.5"><Icon name="Package" className="text-blue-600" size={12}/> Top Produtos ({timeMode})</h3><button onClick={() => openModal('produtos')} className="text-[8px] font-bold text-blue-600 bg-blue-50 px-1.5 py-0.5 rounded hover:bg-blue-100 flex items-center gap-1"><Icon name="List" size={8}/> Raio-X</button></div>
                                <div className="h-[220px] w-full"><ResponsiveContainer width="100%" height="100%"><BarChart data={topProducts} layout="vertical" margin={{ top: 0, right: 60, left: 10, bottom: 0 }}><XAxis type="number" hide={true} /><YAxis dataKey="name" type="category" width={110} axisLine={false} tickLine={false} tickFormatter={formatYAxisTick} tick={{fontSize: 8, fontWeight: 700, fill: '#64748b'}} /><Tooltip content={(props) => <CustomYoyTooltip {...props} isProduct={true} yearComparison={yearComparison} />} cursor={{fill: '#f8fafc'}} /><Legend verticalAlign="top" height={20} iconType="circle" wrapperStyle={{ fontSize: '8px', fontWeight: 'bold', color: '#64748b' }} /><Bar dataKey="qtyCur" name="Atual" fill="#3b82f6" radius={[0, 3, 3, 0]} barSize={6} label={renderProductBarLabel} /><Bar dataKey="qtyComp" name="Anterior" fill="#cbd5e1" radius={[0, 3, 3, 0]} barSize={6} /></BarChart></ResponsiveContainer></div>
                            </div>
                            <div className="bg-white p-3 rounded-lg border border-slate-200 shadow-sm flex flex-col group">
                                <div className="flex justify-between items-center mb-2"><h3 className="text-[10px] font-black uppercase tracking-widest text-slate-800 flex items-center gap-1.5"><Icon name="Truck" className="text-emerald-500" size={12}/> Top Distribuidores ({timeMode})</h3><button onClick={() => openModal('distribuidores')} className="text-[8px] font-bold text-emerald-600 bg-emerald-50 px-1.5 py-0.5 rounded hover:bg-emerald-100 flex items-center gap-1"><Icon name="TrendingUp" size={8}/> Raio-X</button></div>
                                <div className="h-[220px] w-full"><ResponsiveContainer width="100%" height="100%"><BarChart data={topDistribuidores} layout="vertical" margin={{ top: 0, right: 60, left: 10, bottom: 0 }}><XAxis type="number" hide={true} /><YAxis dataKey="name" type="category" axisLine={false} tickLine={false} tickFormatter={formatYAxisTick} tick={{fontSize: 8, fontWeight: 700, fill: '#64748b'}} width={90} /><Tooltip content={(props) => <CustomYoyTooltip {...props} yearComparison={yearComparison} />} cursor={{fill: '#f8fafc'}} /><Legend verticalAlign="top" height={20} iconType="circle" wrapperStyle={{ fontSize: '8px', fontWeight: 'bold', color: '#64748b' }} /><Bar dataKey="curVal" name="Atual" fill="#10b981" radius={[0, 3, 3, 0]} barSize={6} label={renderDistributorBarLabel} /><Bar dataKey="compVal" name="Anterior" fill="#cbd5e1" radius={[0, 3, 3, 0]} barSize={6} /></BarChart></ResponsiveContainer></div>
                            </div>
                            <div className="bg-white p-3 rounded-lg border border-slate-200 shadow-sm flex flex-col group">
                                <div className="flex justify-between items-center mb-2"><h3 className="text-[10px] font-black uppercase tracking-widest text-slate-800 flex items-center gap-1.5"><Icon name="Users" className="text-fuchsia-500" size={12}/> Top Clientes ({timeMode})</h3><button onClick={() => openModal('top')} className="text-[8px] font-bold text-fuchsia-600 bg-fuchsia-50 px-1.5 py-0.5 rounded hover:bg-fuchsia-100 flex items-center gap-1"><Icon name="List" size={8}/> Raio-X</button></div>
                                <div className="h-[220px] w-full"><ResponsiveContainer width="100%" height="100%"><BarChart data={topClients} layout="vertical" margin={{ top: 0, right: 60, left: 10, bottom: 0 }}><XAxis type="number" hide={true} /><YAxis dataKey="name" type="category" width={110} axisLine={false} tickLine={false} tickFormatter={formatYAxisTick} tick={{fontSize: 8, fontWeight: 700, fill: '#64748b'}} /><Tooltip content={(props) => <CustomYoyTooltip {...props} yearComparison={yearComparison} />} cursor={{fill: '#f8fafc'}} /><Legend verticalAlign="top" height={20} iconType="circle" wrapperStyle={{ fontSize: '8px', fontWeight: 'bold', color: '#64748b' }} /><Bar dataKey="curVal" name="Atual" fill="#f59e0b" radius={[0, 3, 3, 0]} barSize={6} label={renderClientBarLabel} /><Bar dataKey="compVal" name="Anterior" fill="#cbd5e1" radius={[0, 3, 3, 0]} barSize={6} /></BarChart></ResponsiveContainer></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

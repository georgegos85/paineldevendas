                                                    options={modalConfig.type === 'distribuidores' ? availableModalDistributors.map(d=>({label:d, value:d})) : modalConfig.type === 'produtos' ? availableModalProducts.map(p=>({label:p, value:p})) : availableModalClients.map(c=>({label:c, value:c}))} 
                                                    selected={modalConfig.type === 'distribuidores' ? modalDistributorFilter : modalConfig.type === 'produtos' ? modalProductFilter : modalClientFilter} 
                                                    onChange={val => {
                                                        if(modalConfig.type === 'distribuidores') setModalDistributorFilter(val);
                                                        else if(modalConfig.type === 'produtos') setModalProductFilter(val);
                                                        else if(modalConfig.type === 'top') setModalClientFilter(val);
                                                    }} 
                                                    placeholder="Pesquisar..." 
                                                    searchable={true} 
                                                />
                                            </div>
                                        ) : (
                                            <>
                                                {modalConfig.type === 'capilaridade' && (
                                                    <div className="flex flex-col gap-1.5 min-w-[130px]">
                                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-wider">Filtrar Ano</label>
                                                        <div className="relative">
                                                            <select value={modalYearFilter} onChange={(e) => setModalYearFilter(e.target.value)} className="w-full appearance-none bg-white border border-slate-200 rounded-lg px-3 py-2 text-xs font-bold text-slate-700 focus:ring-2 focus:ring-blue-500 cursor-pointer shadow-sm">
                                                                <option value="Todos">Todos os Anos</option>
                                                                {allAvailableYears.map(y => <option key={y} value={y}>{y}</option>)}
                                                            </select>
                                                            <Icon name="ChevronDown" size={14} className="absolute right-3 top-2.5 text-slate-400 pointer-events-none" />
                                                        </div>
                                                    </div>
                                                )}
                                                <div className="flex flex-col gap-1.5 min-w-[160px]">
                                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-wider">Buscar Cliente</label>
                                                    <DebouncedInput value={localModalSearch} onChange={setLocalModalSearch} placeholder="Nome ou CNPJ..." icon="Search" />
                                                </div>
                                            </>
                                        )}

                                        <div className="w-[150px]"><CustomMultiSelect label="Filtrar UF" options={modalUfOptionsFormatted} selected={modalUfFilter} onChange={setModalUfFilter} placeholder="Todas" searchable={true} /></div>
                                        
                                        <div className="flex items-end gap-2">
                                            {['novos', 'perdidos', 'alerta'].includes(modalConfig.type) && <div className="flex items-center h-[34px] px-3 bg-blue-50 text-blue-600 rounded-xl border border-blue-100 text-xs font-bold shadow-sm">{Number(filteredModalData?.length || 0).toLocaleString('pt-BR')} clientes</div>}
                                            {['preco'].includes(modalConfig.type) && <div className="flex items-center h-[34px] px-3 bg-indigo-50 text-indigo-600 rounded-xl border border-indigo-100 text-xs font-bold shadow-sm">{Number(produtosModalData?.length || 0).toLocaleString('pt-BR')} produtos</div>}
                                            <button onClick={() => setModalConfig({isOpen: false})} className="h-[34px] w-[34px] bg-white border rounded-xl flex items-center justify-center hover:text-rose-500 shadow-sm"><Icon name="X"/></button>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-0 overflow-y-auto modal-scroll flex-1 bg-slate-50/50">
                                    {modalConfig.type === 'capilaridade' ? (
                                        <div className="p-6 h-[400px] min-w-[600px] flex items-center justify-center">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <LineChart data={chartDataCapilaridade} margin={{ top: 10, right: 20, left: -10, bottom: 0 }}>
                                                    <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                                    <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize: 10, fontWeight: 600, fill: '#94a3b8'}} />

                                                    <th className="py-4 px-6 border-b bg-white">Nome / CNPJ</th><th className="py-4 px-6 border-b bg-white text-center">UF</th>
                                                    {modalConfig.type === 'alerta' ? (
                                                        <><th className="py-4 px-6 border-b bg-white text-right">Média Mensal</th><th className="py-4 px-6 border-b bg-white text-center">Status Atraso</th></>
                                                    ) : (
                                                        <><th className="py-4 px-6 border-b bg-white text-right">Fat. Atual (UDM)</th><th className="py-4 px-6 border-b bg-white text-right">Fat. Anterior (UDM)</th></>
                                                    )}
                                                </tr>
                                            </thead>
                                            <tbody className="bg-white">
                                                {filteredModalData.map(c => (
                                                    <tr key={c.cnpj} className="border-b hover:bg-slate-50">
                                                        <td className="py-3 px-6"><div className="font-bold text-sm truncate max-w-[250px]" title={c.name}>{c.name}</div><div className="text-[10px] text-slate-400">{c.cnpj}</div></td>
                                                        <td className="py-3 px-6 text-center"><span className="bg-slate-100 px-2 py-1 rounded text-[10px] font-bold text-slate-600">{c.state}</span></td>
                                                        {modalConfig.type === 'alerta' ? (
                                                            <><td className="py-3 px-6 text-right font-bold text-sm text-slate-500">{formatCurrency(c.mediaMensal)}/mês</td><td className="py-3 px-6 text-center"><span className="bg-amber-100 text-amber-700 px-2 py-1 rounded-md text-[10px] font-black">{c.atraso} mês(es)</span></td></>
                                                        ) : (
                                                            <><td className="py-3 px-6 text-right font-bold text-sm">{formatCurrency(c.fatCur)}</td><td className="py-3 px-6 text-right text-slate-400 text-sm">{formatCurrency(c.fatComp)}</td></>
                                                        )}
                                                    </tr>
                                                ))}
                                            </tbody>
                                            <tfoot className="bg-slate-50 sticky bottom-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                                                <tr className="text-xs font-black text-slate-800 uppercase tracking-wider">
                                                    {modalConfig.type === 'alerta' ? (
                                                        <><td colSpan="2" className="py-4 px-6 text-right">Fat. em Risco:</td><td colSpan="2" className="py-4 px-6 text-left text-amber-600">{formatCurrency(totalModalFatCurLocal)}</td></>
                                                    ) : (
                                                        <><td colSpan="2" className="py-4 px-6 text-right">Total Selecionado:</td><td className="py-4 px-6 text-right text-emerald-600">{formatCurrency(totalModalFatCurLocal)}</td><td className="py-4 px-6 text-right text-slate-600">{formatCurrency(totalModalFatCompLocal)}</td></>
                                                    )}
                                                </tr>
                                            </tfoot>
                                        </table>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Cabeçalho principal */}
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                        <div>
                            <div className="flex items-center gap-3 mb-1"><div className="w-2 h-6 bg-blue-600 rounded-full"></div><h1 className="text-2xl font-black tracking-tight text-slate-800 uppercase">Performance Comercial</h1></div>
                            <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Dashboard Dinâmico e Local (Ultra-Rápido)</p>
                        </div>
                        <div className="flex items-center gap-3">
                            {lastUpdate && <div className="text-xs font-bold text-slate-500 bg-white border border-slate-200 px-3 py-1.5 rounded-full flex items-center gap-2"><Icon name="Clock" size={14}/> Atualizado: <span className="text-slate-700">{lastUpdate}</span></div>}
                            <button onClick={() => setShowUploadScreen(true)} className="flex items-center gap-2 bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-md hover:bg-black transition-colors"><Icon name="Upload" size={14}/> CSV Local</button>
                        </div>
                    </div>

                    {/* Barra de Filtros Principais */}
                    <div className="bg-white p-4 rounded-[1.5rem] border border-slate-100 shadow-sm mb-6 flex flex-wrap gap-3 items-end">
                        <div className="flex-1 min-w-[200px]">
                            <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Buscar Cliente</label>
                            <DebouncedInput value={filters.searchCustomer} onChange={v => setFilters({...filters, searchCustomer: v})} placeholder="Nome ou CNPJ..." icon="Search" />
                        </div>
                        <div className="flex-1 min-w-[200px]">
                            <label className="text-[10px] font-black text-slate-400 uppercase mb-1 block">Busca Produto</label>
                            <DebouncedInput value={filters.searchProduct} onChange={v => setFilters({...filters, searchProduct: v})} placeholder="Nome Produto..." icon="Package" />
                        </div>
                        <CustomMultiSelect label="Anos" options={options.years} selected={filters.years} onChange={v => setFilters({...filters, years: v})} placeholder="Todos" searchable={true} />
                        <CustomMultiSelect label="Meses" options={options.months} selected={filters.months} onChange={v => setFilters({...filters, months: v})} placeholder="Todos" searchable={true} />
                        <CustomMultiSelect label="Estado" options={options.states} selected={filters.state} onChange={v => setFilters({...filters, state: v})} placeholder="Todos" searchable={true} />
                        <CustomMultiSelect label="Tipo Cliente" options={options.customerTypes} selected={filters.customerType} onChange={v => setFilters({...filters, customerType: v})} placeholder="Todos" searchable={true} />
                        <CustomMultiSelect label="Unidade" options={options.units} selected={filters.type} onChange={v => setFilters({...filters, type: v})} placeholder="Todas" searchable={true} />
                    </div>

                    {/* KPI Cards (Topo) */}
                    <div className="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-4 mb-6">
                        <div className="bg-white p-4 lg:p-5 rounded-[1.5rem] border border-slate-100 shadow-sm flex flex-col justify-between">
                            <div><p className="text-slate-400 text-[9px] font-black uppercase mb-1">Faturamento (Seleção)</p><h3 className="text-xl lg:text-2xl font-black text-slate-800">{formatCurrency(statsFiltered.fat)}</h3></div>
                            <GrowthBadge growth={metrics.fatGrowth} curLabel={yearComparison?.curLabel} prevLabel={yearComparison?.prevLabel} />
                        </div>
                        <div onClick={() => openModal('preco')} className="bg-white hover:bg-slate-50 transition-colors p-4 lg:p-5 rounded-[1.5rem] border border-slate-100 shadow-sm flex flex-col justify-between cursor-pointer group">
                            <div>
                                <div className="flex justify-between items-start mb-1"><p className="text-slate-500/70 text-[9px] font-black uppercase">Preço Médio (Seleção)</p><Icon name="Package" size={12} className="text-slate-300 group-hover:text-blue-500" /></div>
                                <h3 className="text-xl lg:text-2xl font-black text-blue-600">R$ {Number(statsFiltered.precoMedio || 0).toFixed(2)}</h3>
                                <p className="text-slate-500 text-[9px] font-bold mt-1">Por unidade faturada</p>
                            </div>
                            <div className="flex flex-col gap-1 mt-auto">
                                <GrowthBadge growth={metrics.precoMedioGrowth} curLabel={yearComparison?.curLabel} prevLabel={yearComparison?.prevLabel} />
                                <div className="mt-1 flex items-center gap-1 text-[9px] font-bold w-fit px-2 py-0.5 rounded-full bg-slate-50 text-slate-500 group-hover:bg-blue-100 group-hover:text-blue-600 transition-colors border border-slate-200">Clique para detalhar</div>
                            </div>
                        </div>
                        <div onClick={() => openModal('capilaridade')} className="bg-white hover:bg-slate-50 transition-colors p-4 lg:p-5 rounded-[1.5rem] border border-slate-100 shadow-sm flex flex-col justify-between cursor-pointer group">
                            <div>
                                <div className="flex justify-between items-start mb-1"><p className="text-slate-500/70 text-[9px] font-black uppercase">Capilaridade (Seleção)</p><Icon name="TrendingUp" size={12} className="text-slate-300 group-hover:text-blue-500" /></div>
                                <h3 className="text-xl lg:text-2xl font-black text-slate-800">{Number(statsFiltered.cap || 0).toLocaleString('pt-BR')}</h3>
                                <p className="text-slate-500 text-[9px] font-bold mt-1">PDVs na seleção</p>
                            </div>
                            <div className="flex flex-col gap-1 mt-auto">
                                <GrowthBadge growth={metrics.capGrowth} curLabel={yearComparison?.curLabel} prevLabel={yearComparison?.prevLabel} />
                                <div className="mt-1 flex items-center gap-1 text-[9px] font-bold w-fit px-2 py-0.5 rounded-full bg-slate-50 text-slate-500 group-hover:bg-blue-100 group-hover:text-blue-600 transition-colors border border-slate-200">Clique para ver evolução</div>
                            </div>
                        </div>
                        <div onClick={() => openModal('novos')} className="bg-emerald-50 hover:bg-emerald-100 transition-colors p-4 lg:p-5 rounded-[1.5rem] border border-emerald-100 shadow-sm flex flex-col justify-between cursor-pointer group">
                            <div>
                                <div className="flex justify-between items-start mb-1"><p className="text-emerald-600/70 text-[9px] font-black uppercase">Clientes Novos (Ciclo UDM)</p><Icon name="List" size={12} className="text-emerald-400 group-hover:text-emerald-600" /></div>
                                <h3 className="text-xl lg:text-2xl font-black text-emerald-700">{Number(metrics.novosMain || 0).toLocaleString('pt-BR')}</h3>
                                <p className="text-emerald-600 text-[9px] font-bold mt-1">{formatCurrency(metrics.fatNovosMain)} receita</p>
                            </div>
                            <div className="flex flex-col gap-1 mt-auto">
                                <div className="mt-1 flex items-center gap-1 text-[9px] font-bold w-fit px-2 py-0.5 rounded-full bg-emerald-200/50 text-emerald-700 group-hover:bg-emerald-600 group-hover:text-white transition-colors">Clique para detalhar</div>
                            </div>
                        </div>
                        <div onClick={() => openModal('alerta')} className="bg-amber-50 hover:bg-amber-100 transition-colors p-4 lg:p-5 rounded-[1.5rem] border border-amber-100 shadow-sm flex flex-col justify-between cursor-pointer group">
                            <div>
                                <div className="flex justify-between items-start mb-1"><p className="text-amber-600/70 text-[9px] font-black uppercase">Em Alerta (Ciclo UDM)</p><Icon name="Bell" size={12} className="text-amber-400 group-hover:text-amber-600" /></div>
                                <h3 className="text-xl lg:text-2xl font-black text-amber-700">{Number(metrics.alertaMain || 0).toLocaleString('pt-BR')}</h3>
                                <p className="text-amber-600 text-[9px] font-bold mt-1">Estoque Virtual Vencido</p>
                            </div>
                            <div className="flex flex-col gap-1 mt-auto">
                                <div className="mt-1 flex items-center gap-1 text-[9px] font-bold w-fit px-2 py-0.5 rounded-full bg-amber-200/50 text-amber-800 group-hover:bg-amber-600 group-hover:text-white transition-colors">Clique para detalhar</div>
                            </div>
                        </div>
                        <div onClick={() => openModal('perdidos')} className="bg-rose-50 hover:bg-rose-100 transition-colors p-4 lg:p-5 rounded-[1.5rem] border border-rose-100 shadow-sm flex flex-col justify-between cursor-pointer group">
                            <div>
                                <div className="flex justify-between items-start mb-1"><p className="text-rose-600/70 text-[9px] font-black uppercase">Clientes Perdidos (Ciclo UDM)</p><Icon name="List" size={12} className="text-rose-400 group-hover:text-rose-600" /></div>
                                <h3 className="text-xl lg:text-2xl font-black text-rose-700">{Number(metrics.perdidosMain || 0).toLocaleString('pt-BR')}</h3>
                                <p className="text-rose-600 text-[9px] font-bold mt-1">{formatCurrency(metrics.fatPerdidosMain)} churn</p>
                            </div>
                            <div className="flex flex-col gap-1 mt-auto">
                                <div className="mt-1 flex items-center gap-1 text-[9px] font-bold w-fit px-2 py-0.5 rounded-full bg-rose-200/50 text-rose-700 group-hover:bg-rose-600 group-hover:text-white transition-colors">Clique para detalhar</div>
                            </div>
                        </div>
                    </div>

                    {/* Gráficos Meio */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
                        <div className="lg:col-span-2 bg-white p-6 rounded-[1.5rem] border border-slate-100 shadow-sm">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="text-sm font-black uppercase tracking-widest text-slate-800 flex items-center gap-2"><Icon name="TrendingUp" className="text-blue-600" size={16}/> Evolução (Mensal)</h3>
                                <div className="flex bg-slate-100 p-1 rounded-lg">
                                    <button onClick={() => setEvolucaoMode('faturamento')} className={`px-3 py-1 text-[10px] font-bold rounded-md transition-colors ${evolucaoMode === 'faturamento' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}>R$ Fat.</button>
                                    <button onClick={() => setEvolucaoMode('quantidade')} className={`px-3 py-1 text-[10px] font-bold rounded-md transition-colors ${evolucaoMode === 'quantidade' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}>Unidades</button>
                                </div>
                            </div>
                            <div className="h-[300px] w-full">
                                <ResponsiveContainer width="100%" height="100%">
                                    <LineChart data={chartDataEvolucao} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                        <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize: 10, fontWeight: 600, fill: '#94a3b8'}} />
                                        <YAxis axisLine={false} tickLine={false} tick={{fontSize: 10, fontWeight: 600, fill: '#94a3b8'}} tickFormatter={v => evolucaoMode === 'faturamento' ? `${(Number(v)/1000000).toFixed(1)}M` : (v>=1000 ? (Number(v)/1000).toFixed(1)+'k' : v)} />
                                        <Tooltip formatter={(v, name) => [evolucaoMode === 'faturamento' ? formatCurrency(v) : `${Number(v || 0).toLocaleString('pt-BR')} un`, `Ano ${name}`]} contentStyle={{borderRadius: '12px', border: 'none', boxShadow: '0 10px 15px rgba(0,0,0,0.1)'}} />
                                        <Legend verticalAlign="top" height={30} iconType="circle" wrapperStyle={{ fontSize: '10px', fontWeight: 'bold', color: '#64748b' }} />
                                        {mediaEvolucao !== null && <ReferenceLine y={mediaEvolucao} stroke="#94a3b8" strokeDasharray="4 4" label={{ position: 'top', value: `Média: ${evolucaoMode === 'faturamento' ? formatCurrency(mediaEvolucao) : (mediaEvolucao>=1000 ? (Number(mediaEvolucao)/1000).toFixed(1)+'k' : Number(mediaEvolucao).toFixed(0))}`, fill: '#64748b', fontSize: 10, fontWeight: 'bold' }} />}
                                        {activeYears.map((y, i) => <Line key={y} type="monotone" dataKey={y} name={y.toString()} stroke={CHART_COLORS[i % CHART_COLORS.length]} strokeWidth={3} dot={{r: 4, strokeWidth: 2}} activeDot={{r: 6}} connectNulls={false} />)}
                                    </LineChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-[1.5rem] border border-slate-100 shadow-sm">
                             <h3 className="text-sm font-black uppercase tracking-widest text-slate-800 flex items-center gap-2 mb-4"><Icon name="MapPin" className="text-blue-600" size={16}/> Representatividade UF (UDM Atual)</h3>
                             <div className="h-[300px] w-full">
                                <ResponsiveContainer width="100%" height="100%">
                                    <PieChart>
                                        <Pie data={dataUF} dataKey="value" nameKey="name" cx="50%" cy="50%" innerRadius={45} outerRadius={70} paddingAngle={3} label={({ name, percent }) => `${name} ${(Number(percent) * 100).toFixed(1)}%`} labelLine={true}>
                                            {dataUF.map((e, i) => <Cell key={i} fill={CHART_COLORS[i % CHART_COLORS.length]} />)}
                                        </Pie>
                                        <Tooltip content={<CustomUFTooltip />} />
                                        <Legend verticalAlign="bottom" height={24} iconType="circle" wrapperStyle={{fontSize: '10px', fontWeight: 'bold', color: '#64748b'}} />
                                    </PieChart>
                                </ResponsiveContainer>
                             </div>
                        </div>
                    </div>

                    {/* Gráficos Base - 3 colunas exatas da imagem */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Top Produtos */}
                        <div className="bg-white p-6 rounded-[1.5rem] border border-slate-100 shadow-sm overflow-hidden flex flex-col group">
                             <div className="flex justify-between items-center mb-4">
                                <h3 className="text-sm font-black uppercase tracking-widest text-slate-800 flex items-center gap-2"><Icon name="Package" className="text-blue-600" size={16}/> Top Produtos (UDM)</h3>
                                <button onClick={() => openModal('produtos')} className="text-[9px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-lg hover:bg-blue-100 transition-colors flex items-center gap-1"><Icon name="List" size={12}/> Raio-X</button>
                             </div>
                             <div className="h-[300px] w-full mt-2">
                                <ResponsiveContainer width="100%" height="100%">
                                    <BarChart data={topProducts} layout="vertical" margin={{ top: 0, right: 80, left: 10, bottom: 0 }}>
                                        <XAxis type="number" hide={true} />
                                        <YAxis dataKey="name" type="category" width={140} axisLine={false} tickLine={false} tickFormatter={formatYAxisTick} tick={{fontSize: 9, fontWeight: 700, fill: '#64748b'}} />
                                        <Tooltip content={(props) => <CustomYoyTooltip {...props} isProduct={true} yearComparison={yearComparison} />} cursor={{fill: '#f8fafc'}} />
                                        <Legend verticalAlign="top" height={24} iconType="circle" wrapperStyle={{ fontSize: '10px', fontWeight: 'bold', color: '#64748b' }} />
                                        <Bar dataKey="qtyCur" name="Atual (12m)" fill="#3b82f6" radius={[0, 4, 4, 0]} barSize={10} label={renderProductBarLabel} />
                                        <Bar dataKey="qtyComp" name="Anterior (12m)" fill="#cbd5e1" radius={[0, 4, 4, 0]} barSize={10} />
                                    </BarChart>
                                </ResponsiveContainer>
                             </div>
                        </div>

                        {/* Top Distribuidores */}
                        <div className="bg-white p-6 rounded-[1.5rem] border border-slate-100 shadow-sm overflow-hidden flex flex-col group">
                             <div className="flex justify-between items-center mb-4">
                                <h3 className="text-sm font-black uppercase tracking-widest text-slate-800 flex items-center gap-2"><Icon name="Truck" className="text-emerald-500" size={16}/> Top Distribuidores (UDM)</h3>
                                <button onClick={() => openModal('distribuidores')} className="text-[9px] font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded-lg hover:bg-emerald-100 transition-colors flex items-center gap-1"><Icon name="TrendingUp" size={12}/> Raio-X</button>
                             </div>
                             <div className="h-[300px] w-full mt-2">
                                <ResponsiveContainer width="100%" height="100%">
                                    <BarChart data={topDistribuidores} layout="vertical" margin={{ top: 0, right: 80, left: 10, bottom: 0 }}>
                                        <XAxis type="number" hide={true} />
                                        <YAxis dataKey="name" type="category" axisLine={false} tickLine={false} tickFormatter={formatYAxisTick} tick={{fontSize: 9, fontWeight: 700, fill: '#64748b'}} width={110} />
                                        <Tooltip content={(props) => <CustomYoyTooltip {...props} yearComparison={yearComparison} />} cursor={{fill: '#f8fafc'}} />
                                        <Legend verticalAlign="top" height={24} iconType="circle" wrapperStyle={{ fontSize: '10px', fontWeight: 'bold', color: '#64748b' }} />
                                        <Bar dataKey="curVal" name="Atual (12m)" fill="#10b981" radius={[0, 4, 4, 0]} barSize={10} label={renderDistributorBarLabel} />
                                        <Bar dataKey="compVal" name="Anterior (12m)" fill="#cbd5e1" radius={[0, 4, 4, 0]} barSize={10} />
                                    </BarChart>
                                </ResponsiveContainer>
                             </div>
                        </div>

                        {/* Top Clientes */}
                        <div className="bg-white p-6 rounded-[1.5rem] border border-slate-100 shadow-sm overflow-hidden flex flex-col group">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-sm font-black uppercase tracking-widest text-slate-800 flex items-center gap-2"><Icon name="Users" className="text-fuchsia-500" size={16}/> Top Clientes (UDM)</h3>
                                <button onClick={() => openModal('top')} className="text-[9px] font-bold text-fuchsia-600 bg-fuchsia-50 px-2 py-1 rounded-lg hover:bg-fuchsia-100 transition-colors flex items-center gap-1"><Icon name="List" size={12}/> Raio-X</button>
                            </div>
                            <div className="h-[300px] w-full mt-2">
                                <ResponsiveContainer width="100%" height="100%">
                                    <BarChart data={topClients} layout="vertical" margin={{ top: 0, right: 80, left: 10, bottom: 0 }}>
                                        <XAxis type="number" hide={true} />
                                        <YAxis dataKey="name" type="category" width={150} axisLine={false} tickLine={false} tickFormatter={formatYAxisTick} tick={{fontSize: 9, fontWeight: 700, fill: '#64748b'}} />
                                        <Tooltip content={(props) => <CustomYoyTooltip {...props} yearComparison={yearComparison} />} cursor={{fill: '#f8fafc'}} />
                                        <Legend verticalAlign="top" height={30} iconType="circle" wrapperStyle={{ fontSize: '11px', fontWeight: 'bold', color: '#64748b' }} />
                                        <Bar dataKey="curVal" name="Atual (12m)" fill="#f59e0b" radius={[0, 4, 4, 0]} barSize={10} label={renderClientBarLabel} />
                                        <Bar dataKey="compVal" name="Anterior (12m)" fill="#cbd5e1" radius={[0, 4, 4, 0]} barSize={10} />
                                    </BarChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
